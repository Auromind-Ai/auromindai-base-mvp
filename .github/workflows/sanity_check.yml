name: Auto-Verify Code 🤖

# Trigger this check on every push to main, or every Pull Request to main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Backend Sanity Check
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code
    - uses: actions/checkout@v3

    # 2. Install Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3. Try to install the app (catches missing libraries)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    # 4. Check for Syntax Errors (Basic Verification)
    - name: Check for Syntax Errors
      run: |
        python -m compileall backend/
