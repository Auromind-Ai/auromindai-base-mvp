services:

  redis:
    image: redis:7-alpine
    container_name: auromind_redis
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: auromind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Arunjack007@
      POSTGRES_DB: auromindai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/logs:/app/logs 
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:Arunjack007%40@db:5432/auromindai
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TWILIO_STATUS_CALLBACK_URL: https://ginette-intercentral-dulce.ngrok-free.dev/twilio/status-callback
    depends_on:
      - redis
      - db

  #  --- CELERY WORKER HERE --- 
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./backend/logs:/app/logs 
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:Arunjack007%40@db:5432/auromindai
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TWILIO_STATUS_CALLBACK_URL: https://ginette-intercentral-dulce.ngrok-free.dev/twilio/status-callback
    depends_on:
      - redis
      - db
  # -------------------------------- 

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auromind_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data: