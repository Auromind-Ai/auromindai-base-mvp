
services:

  redis:
    image: redis:7-alpine
    container_name: auromind_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    container_name: auromind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auromindai
      POSTGRES_PASSWORD: auromindai
      POSTGRES_DB: auromindai
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auromindai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 75"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_worker
    env_file:
      - ./backend/.env
    restart: unless-stopped

    command: >
      sh -c "until pg_isready -h db -U postgres -d auromindai; do echo 'Waiting for database...'; sleep 1; done &&
             until PGPASSWORD=Arunjack007@ psql -h db -U postgres -d auromindai -c 'SELECT 1;' >/dev/null 2>&1; do echo 'Waiting for database query readiness...'; sleep 1; done &&
             sleep 2 &&
             celery -A app.core.celery_app worker --loglevel=info --pool=prefork --concurrency=2 -Q default,beat"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_beat
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: >
      sh -c "until pg_isready -h db -U postgres -d auromindai; do echo 'Waiting for database...'; sleep 1; done &&
             until PGPASSWORD=Arunjack007@ psql -h db -U postgres -d auromindai -c 'SELECT 1;' >/dev/null 2>&1; do echo 'Waiting for database query readiness...'; sleep 1; done &&
             sleep 2 &&
             celery -A app.core.celery_app beat --loglevel=info"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy



volumes:
  postgres_data:

