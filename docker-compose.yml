
services:

  redis:
    image: redis:7-alpine
    container_name: auromind_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: >
      sh -c "python -c \"import time, sqlalchemy;
             while True:
                 try:
                     sqlalchemy.create_engine('${DATABASE_URL}').connect()
                     break
                 except Exception as e:
                     print('Waiting for database connection...', e)
                     time.sleep(2)
             \" &&
             alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 75"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_worker
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: >
      sh -c "python -c \"import time, sqlalchemy;
             while True:
                 try:
                     sqlalchemy.create_engine('${DATABASE_URL}').connect()
                     break
                 except Exception as e:
                     print('Waiting for database connection...', e)
                     time.sleep(2)
             \" &&
             sleep 2 &&
             celery -A app.core.celery_app worker --loglevel=info --pool=prefork --concurrency=2 -Q default,beat"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_beat
    env_file:
      - ./backend/.env
    restart: unless-stopped
    command: >
      sh -c "python -c \"import time, sqlalchemy;
             while True:
                 try:
                     sqlalchemy.create_engine('${DATABASE_URL}').connect()
                     break
                 except Exception as e:
                     print('Waiting for database connection...', e)
                     time.sleep(2)
             \" &&
             sleep 2 &&
             celery -A app.core.celery_app beat --loglevel=info"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"