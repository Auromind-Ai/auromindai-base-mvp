
services:

  redis:
    image: redis:7-alpine
    container_name: auromind_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    network_mode: "host"
    command: >
      sh -c "until python -c \"import sqlalchemy; sqlalchemy.create_engine('$${DATABASE_URL}').connect()\" 2>/dev/null; do echo 'Waiting for database connection...'; sleep 2; done &&
             alembic upgrade heads &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 75"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_worker
    env_file:
      - ./backend/.env
    restart: unless-stopped
    network_mode: "host"
    command: >
      sh -c "until python -c \"import sqlalchemy; sqlalchemy.create_engine('$${DATABASE_URL}').connect()\" 2>/dev/null; do echo 'Waiting for database connection...'; sleep 2; done &&
             sleep 2 &&
             celery -A app.core.celery_app worker --loglevel=info --pool=prefork --concurrency=2 -Q default,beat"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auromind_celery_beat
    env_file:
      - ./backend/.env
    restart: unless-stopped
    network_mode: "host"
    command: >
      sh -c "until python -c \"import sqlalchemy; sqlalchemy.create_engine('$${DATABASE_URL}').connect()\" 2>/dev/null; do echo 'Waiting for database connection...'; sleep 2; done &&
             sleep 2 &&
             celery -A app.core.celery_app beat --loglevel=info"
    environment:
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: 1
    volumes:
      - ./backend/logs:/app/logs
      - ./backend:/app
      - ./hf_cache:/models/huggingface